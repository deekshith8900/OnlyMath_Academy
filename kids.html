<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnlyMath Kids | Fun Counting</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Inline styles for kids mode to avoid conflicts with main CSS -->
    <style>
        body.kids-mode {
            background-color: #f0fdf4;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            overflow: hidden; /* Prevent scrolling for toddlers */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: #333;
            user-select: none; /* Prevent text selection */
        }

        .kids-header {
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 4px solid #4ade80;
        }

        .kids-header a {
            text-decoration: none;
            color: #ef4444;
            font-weight: 900;
            font-size: 1.5rem;
            background: #fee2e2;
            padding: 10px 20px;
            border-radius: 30px;
            border: 3px solid #ef4444;
        }

        .kids-header h1 {
            margin: 0;
            font-family: 'Fredoka One', cursive;
            color: #3b82f6;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #bfdbfe;
        }

        /* Container for Map vs Game */
        .view-container {
            flex-grow: 1;
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .view-container.active {
            display: flex;
        }

        /* Map View Specifics */
        .map-area {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            background: #e0f2fe;
            /* Simple vertical scrolling for toddlers */
        }

        .level-node {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #9ca3af; /* Gray/Locked by default */
            border: 8px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-family: 'Fredoka One', cursive;
            margin: 30px 0;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .level-node.unlocked {
            background: #3b82f6;
            border-color: #1d4ed8;
            box-shadow: 0 10px 0 #1e3a8a, 0 15px 20px rgba(0,0,0,0.2);
        }

        .level-node.completed {
            background: #10b981;
            border-color: #047857;
            box-shadow: 0 10px 0 #064e3b, 0 15px 20px rgba(0,0,0,0.2);
        }

        .level-node:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 rgba(0,0,0,0.1);
        }

        /* Winding path effect */
        .level-node:nth-child(even) {
            transform: translateX(60px);
        }
        .level-node:nth-child(odd) {
            transform: translateX(-60px);
        }
        .level-node:nth-child(even):active {
            transform: translateX(60px) translateY(10px);
        }
        .level-node:nth-child(odd):active {
            transform: translateX(-60px) translateY(10px);
        }

        /* Connecting lines */
        .level-node::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 60px;
            background: #cbd5e1;
            top: 100%;
            z-index: -1;
        }
        .level-node:last-child::after {
            display: none;
        }
        
        .level-node.unlocked::after, .level-node.completed::after {
            background: #fcd34d;
        }

        .level-node:nth-child(even)::after {
            transform: rotate(45deg);
            transform-origin: top;
        }
        .level-node:nth-child(odd)::after {
            transform: rotate(-45deg);
            transform-origin: top;
        }

        /* Game View Area */
        .play-area {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .mascot {
            font-size: 6rem;
            animation: bounce 2s infinite ease-in-out;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .equation-display {
            font-family: 'Fredoka One', cursive;
            font-size: 5rem;
            color: #f59e0b;
            text-shadow: 3px 3px 0px #fff;
            margin-bottom: 2rem;
            height: 100px; /* fixed height to prevent jumping */
        }

        .items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 80%;
            min-height: 150px;
        }

        .item {
            font-size: 4rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }

        .controls {
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: center;
            gap: 20px;
            box-sizing: border-box;
            background: #fff;
            border-top: 4px solid #fcd34d;
        }

        .action-btn {
            background: #3b82f6;
            color: white;
            border: 4px solid #2563eb;
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            padding: 20px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1d4ed8, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .action-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #1d4ed8, 0 5px 10px rgba(0,0,0,0.2);
        }

        .action-btn.reset {
            background: #ef4444;
            border-color: #dc2626;
            box-shadow: 0 8px 0 #b91c1c, 0 15px 20px rgba(0,0,0,0.2);
            font-size: 1.5rem;
        }
        
        .action-btn.reset:active {
            box-shadow: 0 0 0 #b91c1c, 0 5px 10px rgba(0,0,0,0.2);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Confetti Canvas */
        #confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Character Picker Modal */
        .picker-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .picker-modal.open {
            opacity: 1;
            pointer-events: all;
        }

        .picker-content {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            border: 5px solid #a855f7;
            text-align: center;
        }

        .picker-content h2 {
            font-family: 'Fredoka One', cursive;
            color: #a855f7;
            font-size: 2rem;
            margin-top: 0;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 1rem;
            max-height: 50vh;
            overflow-y: auto;
        }

        .char-option {
            font-size: 3rem;
            cursor: pointer;
            background: #f3f4f6;
            border-radius: 15px;
            padding: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .char-option:active {
            transform: scale(0.9);
            background: #e5e7eb;
        }

        .close-picker-btn {
            margin-top: 20px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.5rem;
            border-radius: 20px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
        }

    </style>
</head>
<body class="kids-mode">

    <div class="kids-header">
        <a href="#" id="backToMapBtn" style="display:none;">← Map</a>
        <a href="index.html" id="backToHomeBtn">← Home</a>
        <h1 id="headerTitle">Math Map</h1>
        <button id="openPickerBtn" style="background: #a855f7; color: white; border: 3px solid #7e22ce; padding: 10px 20px; border-radius: 30px; font-weight: 900; font-size: 1.2rem; cursor: pointer; display: none;">Change 🐻</button>
    </div>

    <!-- Map View -->
    <div id="mapView" class="view-container active">
        <div class="map-area" id="mapArea">
            <!-- JS will generate 10 levels here -->
        </div>
    </div>

    <!-- Game View -->
    <div id="gameView" class="view-container">
        <div class="play-area">
            <canvas id="confetti"></canvas>
            <div class="mascot" id="mascot" onclick="mascotSpeak()">🐻</div>
            <!-- Large target number for basic mode -->
            <div class="equation-display" id="equation">0</div>
            <div class="items-container" id="itemsContainer">
                <!-- Items like apples will appear here -->
            </div>
        </div>

        <div class="controls">
            <button class="action-btn" id="addBtn">Add 🍎</button>
            <button class="action-btn reset" id="resetBtn">Start Over 🔄</button>
        </div>
    </div>

    <!-- Character Picker Modal -->
    <div id="pickerModal" class="picker-modal">
        <div class="picker-content">
            <h2>Pick What to Count!</h2>
            <div class="character-grid" id="characterGrid">
                <!-- Javascript will inject 20 characters here -->
            </div>
            <button id="closePickerBtn" class="close-picker-btn">Close</button>
        </div>
    </div>

    <script src="kids.js"></script>
</body>
</html>
